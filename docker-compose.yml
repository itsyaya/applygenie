version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: applygenie-db
    environment:
      POSTGRES_DB: applygenie
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: applygenie-backend
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: applygenie
      DB_USERNAME: postgres
      DB_PASSWORD: password
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
      AWS_SECRET_KEY: ${AWS_SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}

  frontend:
    build: ./frontend
    container_name: applygenie-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
