spring:
  application:
    name: applygenie-ai

  datasource:
    url: jdbc:h2:mem:applygenie;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

app:
  jwt:
    secret: C8A9E3FA4B7CDE1219F58BE46A8F12D3A9C8D6B71E42B1A89BFFC32D9A9B2CF0
    expiration-ms: 86400000

server:
  port: 8080
